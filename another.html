<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form</title>
    <link rel="stylesheet" href="styling.css">
</head>

<body>

<!-- LOGIN FORM -->
<div id="formpart1">
    <h1 align="center">Customer Login</h1>

    <form onsubmit="return validation()">
        <div class="row">
            <label>ID</label>
            <input type="text" id="ide" placeholder="Enter ID">

            <label>Password</label>
            <input type="password" class="passed" placeholder="Enter Password">

            <button type="submit" id="bt1">Login</button>
        </div>
    </form>
</div>


<!-- REGISTRATION FORM -->
<div id="formpart2">
    <h1 align="center">Registration</h1>

    <form onsubmit="return showmsg()">
        <div class="row2">
            <input type="text" placeholder="Enter ID">
            <input type="password" placeholder="Enter password">
            <input type="text" placeholder="Enter email">
            <input type="text" placeholder="Enter your Name">

            <button type="submit" id="bt2">Register</button>
        </div>
    </form>
</div>

<script src="scripting.js"></script>

</body>
</html>
